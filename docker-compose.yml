version: '2'
services:
  ab:
    image: lloydzhou/ab:kvrocks
    volumes:
      - ./data:/data
      - ./htpasswd:/etc/nginx/htpasswd
      - ./lua:/lua
      - ./docker/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh
    environment:
      - INTERVAL=60
    ports:
      - "0.0.0.0:8032:80"

